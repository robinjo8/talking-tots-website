          <section>
            <h2>Kaj je TomiTalk?</h2>
            <p>TomiTalk je interaktivna spletna aplikacija, namenjena otrokom in staršem, ki želijo izboljšati otrokov govor na zabaven in učinkovit način. Aplikacija ponuja širok nabor govornih iger, vaj za izgovorjavo, artikulacijskih testov in logopedskih vsebin, ki so bile razvite v sodelovanju s strokovnjaki – logopedi.</p>
            <p>Naše govorne igre vključujejo spomin, sestavljanke, labirinte, zaporedja, bingo, kolo sreče, met kocke, igro ujemanja in drsne sestavljanke. Vse igre so prilagojene različnim starostnim skupinam in stopnjam govorno-jezikovnega razvoja otrok.</p>
          </section>
          <section>
            <h2>Govorno-jezikovne vaje</h2>
            <p>Poleg iger TomiTalk ponuja tudi strukturirane govorno-jezikovne vaje, ki vključujejo vaje motorike govoril, vaje za jezik in artikulacijske vaje. Te vaje pomagajo otrokom pri pravilni izgovorjavi glasov, kot so R, L, S, Š, Z, Ž, C, Č, K in drugi.</p>
            <p>Artikulacijski test omogoča staršem in logopedom, da ocenijo otrokovo izgovorjavo posameznih glasov in spremljajo napredek skozi čas. Rezultati testa so dostopni v preglednem poročilu.</p>
          </section>
          <section>
            <h2>Za koga je TomiTalk?</h2>
            <p>TomiTalk je namenjen staršem otrok z govornimi težavami, logopedom, ki iščejo digitalna orodja za podporo terapiji, ter vrtcem in šolam, ki želijo vključiti govorne vaje v svoj pedagoški program. Aplikacija je na voljo za posameznike in podjetja z različnimi naročniškimi paketi.</p>
            <p>Logopedski kotički vsebujejo strokovne članke o razvoju govora, motoriki govoril, govorno-jezikovnih težavah in pogosta vprašanja staršev. Vse vsebine so napisane v slovenskem jeziku in prilagojene slovenskim otrokom.</p>
